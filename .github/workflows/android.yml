name: Build M3-Play APK

# Jab bhi aap main branch par 'push' karenge, ye build shuru ho jayega
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Repo ka code fetch karna
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Java (JDK 17) setup karna (Android development ke liye zaroori hai)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 3. Gradlew file ko executable banana (permission dena)
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. Debug APK build karna
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # 5. Build hone ke baad APK file ko save karna (taaki aap download kar saken)
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: M3-Play-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
