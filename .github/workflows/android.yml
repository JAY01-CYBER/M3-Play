name: Build M3-Play APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Grant execute permission
        run: chmod +x gradlew
      - name: Setup Debug Keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -dname "CN=Android Debug,O=Android,C=US" -keyalg RSA -keysize 2048 -validity 10000
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: M3-Play-debug-apk
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
